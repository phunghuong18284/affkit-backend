spring:
  application:
    name: affkit-backend
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://localhost:5433/affkit_db
    username: affkit
    password: affkit123
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
