  short-url-base: http://localhost:8080/go/
  jwt:
    secret: ${JWT_SECRET:affkit-super-secret-key-minimum-32-characters-long-for-hs256}
    access-token-ttl-seconds: 900
  session:
    refresh-token-ttl-days: 7

