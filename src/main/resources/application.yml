spring:
  application:
    name: affkit-backend
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5433/affkit_db}
    username: ${DATABASE_USERNAME:affkit}
    password: ${DATABASE_PASSWORD:affkit123}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      data-source-properties:
        prepareThreshold: 0
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 50
          time_zone: UTC
  flyway:
    enabled: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL:false}

resend:
  api-key: ${RESEND_API_KEY:re_Y9jacGjq_Lnv6HVbXYS44ur458RdxrirP}
  from: ${RESEND_FROM:onboarding@resend.dev}

app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  jwt:
    secret: ${JWT_SECRET:affkit-super-secret-key-minimum-32-characters-long-for-hs256}
    access-token-ttl-seconds: 900
  session:
    refresh-token-ttl-days: 7

accesstrade:
  api-key: ${ACCESSTRADE_API_KEY:b1tnMBS5qwSWDQaL_IuY_mX5OoAhsY0K}
  api-url: https://api.accesstrade.vn/v1/product_link/create
  campaigns:
    tiki: "4348614231480407268"
    lazada: "5087153089503673507"
    tiktok: "6648523843406889655"
    shopee: "4751584435713464237"

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET:affkit-super-secret-key-must-be-at-least-256-bits-long-for-hmac}
  access-token-expiry: 900
  refresh-token-expiry: 604800

logging:
  level:
    vn.affkit: DEBUG
    org.springframework.security: WARN

telegram:
