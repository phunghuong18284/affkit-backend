# rebuild-trigger-v1
spring:
  application:
    name: affkit-backend
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5433/affkit_db}
    username: ${DATABASE_USERNAME:affkit}
    password: ${DATABASE_PASSWORD:affkit123}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      data-source-properties:
        prepareThreshold: 0
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 50
          time_zone: UTC
  flyway:
    enabled: false
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}

