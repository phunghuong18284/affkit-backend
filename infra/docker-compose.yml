version: '3.9'
services:
  postgres:
    image: postgres:16
    container_name: affkit-postgres
    environment:
      POSTGRES_DB: affkit_db
      POSTGRES_USER: affkit
      POSTGRES_PASSWORD: affkit123
      TZ: UTC
      PGTZ: UTC
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    container_name: affkit-redis
    ports:
      - "6379:6379"
volumes:
  postgres_data: